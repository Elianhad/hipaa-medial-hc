services:
  postgres:
    image: postgres:16-alpine
    container_name: hipaa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: hipaa_hce
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U app_user -d hipaa_hce" ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
